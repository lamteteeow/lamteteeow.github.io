<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Macro Pulse - Recession Risk Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-red: #ff7b72;
            --accent-green: #3fb950;
            --accent-blue: #58a6ff;
            --border-color: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        h1, h2 {
            text-align: center;
            font-weight: 600;
        }
        .header-container {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .metrics-bar {
            display: flex;
            justify-content: space-around;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        .metric {
            text-align: center;
        }
        .metric-value {
            font-size: 2em;
            font-weight: bold;
        }
        .metric-label {
            font-size: 0.9em;
            color: #8b949e;
        }
        .danger { color: var(--accent-red); }
        .safe { color: var(--accent-green); }
        .chart-container {
            width: 100%;
            height: 400px;
        }
        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>The Macro Pulse</h1>
        <p style="text-align: center; color: #8b949e;">Recession Risk Dashboard &bull; Last Updated: <span id="last-updated">Loading...</span></p>
    </div>

    <div class="metrics-bar">
        <div class="metric">
            <div class="metric-value" id="risk-score">--%</div>
            <div class="metric-label">Recession Risk Score</div>
        </div>
        <div class="metric">
            <div class="metric-value" id="sahm-value">--</div>
            <div class="metric-label">Sahm Rule (Threshold: 0.5)</div>
        </div>
        <div class="metric">
            <div class="metric-value" id="yc-value">--</div>
            <div class="metric-label">10Y-2Y Spread</div>
        </div>
        <div class="metric">
            <div class="metric-value" id="days-inverted">--</div>
            <div class="metric-label">Days Inverted</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel full-width">
            <h2>Yield Curve (10Y - 2Y Spread)</h2>
            <div id="chart-yc" class="chart-container"></div>
        </div>
        
        <div class="panel">
            <h2>Sahm Rule Recession Indicator</h2>
            <div id="chart-sahm" class="chart-container"></div>
        </div>
        
        <div class="panel">
            <h2>Buffett Indicator (Market Cap / GDP Proxy)</h2>
            <div id="chart-buffett" class="chart-container"></div>
        </div>
    </div>

    <script>
        // Plotly default layout styling for Dark Mode
        const darkLayout = {
            plot_bgcolor: '#161b22',
            paper_bgcolor: '#161b22',
            font: { color: '#c9d1d9' },
            xaxis: { 
                gridcolor: '#30363d',
                zerolinecolor: '#30363d',
                type: 'date'
            },
            yaxis: { 
                gridcolor: '#30363d',
                zerolinecolor: '#8b949e'
            },
            margin: { t: 40, r: 20, l: 40, b: 40 },
            showlegend: false
        };

        function generateRecessionShapes(recessionData) {
            const shapes = [];
            let inRecession = false;
            let startDate = null;

            // Sort data chronologically
            recessionData.sort((a, b) => new Date(a.date) - new Date(b.date));

            recessionData.forEach(point => {
                const val = parseFloat(point.value);
                if (val === 1 && !inRecession) {
                    inRecession = true;
                    startDate = point.date;
                } else if (val === 0 && inRecession) {
                    inRecession = false;
                    shapes.push({
                        type: 'rect',
                        xref: 'x',
                        yref: 'paper',
                        x0: startDate,
                        x1: point.date,
                        y0: 0,
                        y1: 1,
                        fillcolor: 'rgba(128, 128, 128, 0.3)',
                        line: { width: 0 },
                        layer: 'below'
                    });
                }
            });
            // Close open recession
            if (inRecession) {
                shapes.push({
                    type: 'rect',
                    xref: 'x',
                    yref: 'paper',
                    x0: startDate,
                    x1: new Date().toISOString().split('T')[0],
                    y0: 0,
                    y1: 1,
                    fillcolor: 'rgba(128, 128, 128, 0.3)',
                    line: { width: 0 },
                    layer: 'below'
                });
            }
            return shapes;
        }

        async function initDashboard() {
            try {
                const response = await fetch('data/macro_risk.json');
                if (!response.ok) throw new Error('Data file not found');
                const data = await response.json();

                // Update UI Metrics
                document.getElementById('last-updated').textContent = new Date(data.last_updated).toLocaleString();
                
                const scoreEl = document.getElementById('risk-score');
                scoreEl.textContent = `${data.risk_score}%`;
                scoreEl.className = `metric-value ${data.risk_score >= 66 ? 'danger' : data.risk_score <= 33 ? 'safe' : ''}`;

                const sahmEl = document.getElementById('sahm-value');
                const sahmVal = data.current_metrics.sahm_rule;
                sahmEl.textContent = sahmVal != null ? sahmVal.toFixed(2) : '--';
                sahmEl.className = `metric-value ${sahmVal >= 0.5 ? 'danger' : 'safe'}`;

                const ycEl = document.getElementById('yc-value');
                const ycVal = data.current_metrics.yield_curve;
                ycEl.textContent = ycVal != null ? `${ycVal.toFixed(2)}%` : '--';
                ycEl.className = `metric-value ${ycVal <= 0 ? 'danger' : 'safe'}`;

                document.getElementById('days-inverted').textContent = data.days_since_inversion;

                const recessionShapes = generateRecessionShapes(data.series.recession);

                // Chart 1: Yield Curve
                const ycLayout = { ...darkLayout, shapes: [
                    ...recessionShapes,
                    { type: 'line', xref: 'paper', x0: 0, x1: 1, y0: 0, y1: 0, line: { color: '#ff7b72', width: 2, dash: 'dash' } }
                ]};
                Plotly.newPlot('chart-yc', [{
                    x: data.series.yield_curve.map(d => d.date),
                    y: data.series.yield_curve.map(d => parseFloat(d.value)),
                    type: 'scatter',
                    mode: 'lines',
                    line: { color: '#58a6ff' }
                }], ycLayout, {responsive: true});

                // Chart 2: Sahm Rule
                const sahmLayout = { ...darkLayout, shapes: [
                    ...recessionShapes,
                    { type: 'line', xref: 'paper', x0: 0, x1: 1, y0: 0.5, y1: 0.5, line: { color: '#ff7b72', width: 2, dash: 'dash' } }
                ]};
                Plotly.newPlot('chart-sahm', [{
                    x: data.series.sahm_rule.map(d => d.date),
                    y: data.series.sahm_rule.map(d => parseFloat(d.value)),
                    type: 'scatter',
                    mode: 'lines',
                    line: { color: '#d2a8ff' }
                }], sahmLayout, {responsive: true});

                // Chart 3: Buffett Indicator
                const buffettLayout = { ...darkLayout, shapes: recessionShapes };
                Plotly.newPlot('chart-buffett', [{
                    x: data.series.buffett_indicator.map(d => d.date),
                    y: data.series.buffett_indicator.map(d => parseFloat(d.value)),
                    type: 'scatter',
                    mode: 'lines',
                    line: { color: '#3fb950' }
                }], buffettLayout, {responsive: true});

            } catch (error) {
                console.error("Error loading dashboard data:", error);
                document.getElementById('risk-score').textContent = 'Error';
            }
        }

        initDashboard();
    </script>
</body>
</html>
